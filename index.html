<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AliQuiz Register OTP</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:400px;
  background:#1e293b;
  padding:25px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
  text-align:center;
}

h1{
  color:white;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#334155;
  color:white;
}

button{
  width:100%;
  padding:14px;
  margin-top:18px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

.otp-box{ display:none; }

p{
  color:#94a3b8;
  margin-top:15px;
}

/* LOADING SPINNER */
#loader{
  display:none;
  margin:15px auto;
  border:4px solid #334155;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  width:35px;
  height:35px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">

<h1>ALIQUIZ</h1>

<div id="registerBox">

<input type="text" id="nom" placeholder="Nom">
<input type="text" id="prenom" placeholder="Prénom">
<input type="text" id="username" placeholder="Nom d'utilisateur">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="sendOTP()">Créer un compte</button>

<button onclick="googleLogin()" style="background:#ef4444;">
Continuer avec Google
</button>

</div>

<div id="otpBox" class="otp-box">
<input type="number" id="otpInput" placeholder="Entrer OTP">
<button onclick="verifyOTP()">Vérifier OTP</button>
</div>

<div id="loader"></div>

<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCF2I4LEcMA1oJRwa7xthvSOQGSCg6lPjs",
authDomain: "aliquiz-509.firebaseapp.com",
projectId: "aliquiz-509",
storageBucket: "aliquiz-509.firebasestorage.app",
messagingSenderId: "319472495068",
appId: "1:319472495068:web:092e0b9efb14dae8f60719"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

emailjs.init("oLCYHNW4WA4xpu0u3");

// SHOW LOADER
function showLoader(){
  document.getElementById("loader").style.display = "block";
}

// HIDE LOADER
function hideLoader(){
  document.getElementById("loader").style.display = "none";
}

// ================= OTP =================
window.sendOTP = async function(){

const nom = nom.value;
const prenom = prenom.value;
const username = username.value;
const email = email.value;
const password = password.value;

if(!nom || !prenom || !username || !email || !password){
alert("Remplissez tous les champs");
return;
}

showLoader();

const otp = Math.floor(100000 + Math.random() * 900000);
localStorage.setItem("otp", otp);
localStorage.setItem("userData", JSON.stringify({nom,prenom,username,email,password}));

try{
await emailjs.send("service_v9zbetq","template_pcuqdio",{email, otp});

document.getElementById("message").innerText = "OTP envoyé ✔️";
document.getElementById("otpBox").style.display = "block";

}catch(e){
alert("Erreur OTP");
}

hideLoader();
};

// ================= VERIFY OTP =================
window.verifyOTP = async function(){

const otpInput = document.getElementById("otpInput").value;
const savedOTP = localStorage.getItem("otp");

if(otpInput != savedOTP){
alert("OTP incorrect ❌");
return;
}

showLoader();

const userData = JSON.parse(localStorage.getItem("userData"));

const userCredential = await createUserWithEmailAndPassword(
auth,
userData.email,
userData.password
);

const user = userCredential.user;

await setDoc(doc(db,"users",user.uid),{
...userData,
uid:user.uid,
createdAt:new Date()
});

document.getElementById("message").innerText =
"Compte créé ✔️ Redirection...";

// ⏱️ DELAY 3 sec + redirect
setTimeout(()=>{
window.location.href = "https://gona-bot.onrender.com/";
},3000);

hideLoader();
};

// ================= GOOGLE =================
window.googleLogin = async function(){

showLoader();

const result = await signInWithPopup(auth, provider);
const user = result.user;

await setDoc(doc(db,"users",user.uid),{
nom:user.displayName?.split(" ")[0]||"",
prenom:user.displayName?.split(" ")[1]||"",
username:user.email.split("@")[0],
email:user.email,
uid:user.uid
});

document.getElementById("message").innerText =
"Connexion Google ✔️ Redirection...";

// ⏱️ 3 sec delay
setTimeout(()=>{
window.location.href = "https://gona-bot.onrender.com/";
},3000);

hideLoader();
};

</script>

</body>
  </html>
