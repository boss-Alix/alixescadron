<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALIQUIZ Auth</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:400px;
      background:#1e293b;
      padding:25px;
      border-radius:18px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      color:white;
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      outline:none;
      border-radius:10px;
      background:#334155;
      color:white;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      color:white;
      background:#3b82f6;
    }

    button:hover{
      opacity:0.9;
    }

    .google-btn{
      background:#ef4444;
    }

    .link{
      color:#60a5fa;
      cursor:pointer;
      text-align:center;
      margin-top:15px;
      display:block;
      font-size:14px;
    }

    .otp-box{
      display:none;
    }

    #loginBox{
      display:none;
    }

    p{
      color:#94a3b8;
      text-align:center;
      margin-top:15px;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>ALIQUIZ</h1>

  <!-- REGISTER -->

  <div id="registerBox">

    <input type="text" id="nom" placeholder="Nom">

    <input type="text" id="prenom" placeholder="Prénom">

    <input type="text" id="username" placeholder="Nom d'utilisateur">

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Mot de passe">

    <button onclick="sendOTP()">
      Créer un compte
    </button>

    <button class="google-btn"
      onclick="googleLogin()">
      Continuer avec Google
    </button>

    <span class="link"
      onclick="showLogin()">
      Déjà inscrit ?
    </span>

  </div>

  <!-- LOGIN -->

  <div id="loginBox">

    <input type="email"
      id="loginEmail"
      placeholder="Email">

    <input type="password"
      id="loginPassword"
      placeholder="Mot de passe">

    <button onclick="loginUser()">
      Connexion
    </button>

    <button class="google-btn"
      onclick="googleLogin()">
      Continuer avec Google
    </button>

    <span class="link"
      onclick="resetPassword()">
      Mot de passe oublié ?
    </span>

    <span class="link"
      onclick="showRegister()">
      Créer un compte
    </span>

  </div>

  <!-- OTP -->

  <div class="otp-box" id="otpBox">

    <input type="number"
      id="otpInput"
      placeholder="Entrer OTP">

    <button onclick="verifyOTP()">
      Vérifier OTP
    </button>

  </div>

  <p id="message"></p>

</div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

  getAuth,

  createUserWithEmailAndPassword,

  signInWithEmailAndPassword,

  GoogleAuthProvider,

  signInWithPopup,

  sendPasswordResetEmail

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

  getFirestore,

  doc,

  setDoc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyCF2I4LEcMA1oJRwa7xthvSOQGSCg6lPjs",

  authDomain: "aliquiz-509.firebaseapp.com",

  projectId: "aliquiz-509",

  storageBucket: "aliquiz-509.firebasestorage.app",

  messagingSenderId: "319472495068",

  appId: "1:319472495068:web:092e0b9efb14dae8f60719",

  measurementId: "G-WSGCM5L8SQ"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

emailjs.init("oLCYHNW4WA4xpu0u3");

window.showLogin = function(){

  document.getElementById("registerBox")
    .style.display = "none";

  document.getElementById("loginBox")
    .style.display = "block";

}

window.showRegister = function(){

  document.getElementById("loginBox")
    .style.display = "none";

  document.getElementById("registerBox")
    .style.display = "block";

}

window.sendOTP = async function(){

  const nom =
    document.getElementById("nom").value;

  const prenom =
    document.getElementById("prenom").value;

  const username =
    document.getElementById("username").value;

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  if(!nom || !prenom || !username ||
     !email || !password){

    alert("Remplissez tous les champs");

    return;
  }

  if(password.length < 6){

    alert(
      "Mot de passe minimum 6 caractères"
    );

    return;
  }

  const otp =
    Math.floor(100000 + Math.random() * 900000);

  localStorage.setItem("otp", otp);

  localStorage.setItem("userData",

    JSON.stringify({

      nom,
      prenom,
      username,
      email,
      password

    })

  );

  try{

    await emailjs.send(

      "service_v9zbetq",

      "template_pcuqdio",

      {

        email: email,

        otp: otp

      }

    );

    document.getElementById("otpBox")
      .style.display = "block";

    document.getElementById("message")
      .innerText = "OTP envoyé";

  }catch(error){

    alert("Erreur OTP");

    console.log(error);

  }

}

window.verifyOTP = async function(){

  const otpInput =
    document.getElementById("otpInput").value;

  const savedOTP =
    localStorage.getItem("otp");

  if(otpInput != savedOTP){

    alert("OTP incorrect");

    return;
  }

  const userData =
    JSON.parse(localStorage.getItem("userData"));

  try{

    const userCredential =

      await createUserWithEmailAndPassword(

        auth,

        userData.email,

        userData.password

      );

    const user = userCredential.user;

    await setDoc(doc(db,"users",user.uid),{

      nom:userData.nom,

      prenom:userData.prenom,

      username:userData.username,

      email:userData.email,

      uid:user.uid,

      createdAt:new Date()

    });

    window.location.href = "dashboard.html";

  }catch(error){

    console.log(error);

    alert(error.code);

  }

}

window.loginUser = async function(){

  const email =
    document.getElementById("loginEmail").value;

  const password =
    document.getElementById("loginPassword").value;

  try{

    await signInWithEmailAndPassword(

      auth,

      email,

      password

    );

    window.location.href = "dashboard.html";

  }catch(error){

    alert(error.code);

  }

}

window.googleLogin = async function(){

  const provider = new GoogleAuthProvider();

  try{

    const result =
      await signInWithPopup(auth, provider);

    const user = result.user;

    await setDoc(doc(db,"users",user.uid),{

      nom:user.displayName || "",

      prenom:"",

      username:user.displayName || "",

      email:user.email,

      photo:user.photoURL,

      uid:user.uid,

      createdAt:new Date()

    });

    window.location.href = "dashboard.html";

  }catch(error){

    console.log(error);

    alert(error.code);

  }

}

window.resetPassword = async function(){

  const email =
    prompt("Entrer votre email");

  if(!email) return;

  try{

    await sendPasswordResetEmail(auth,email);

    alert(
      "Lien de réinitialisation envoyé"
    );

  }catch(error){

    alert(error.code);

  }

}

</script>

</body>
</html>
